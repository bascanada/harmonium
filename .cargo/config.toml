[alias]
xtask = "run --package xtask --release --"
# Shortcuts for building/running with odin2 backend
run-odin = "run --features odin2"
build-odin = "build --features odin2"

[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "wasm_js"]

# Enable half-precision float instructions on ARM Linux (e.g. Asahi on Apple Silicon).
# Required by gemm-f16 (via candle-core) which emits fullfp16 NEON instructions
# that rustc doesn't enable by default for aarch64-unknown-linux-gnu.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-feature=+fp16"]
